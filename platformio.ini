; CanTick — remote CAN node firmware
; XIAO ESP32-S3 + Seeed CAN Bus Breakout Board (MCP2515, 16 MHz, CS=D7)
; Open this folder (cantick/) as its own PlatformIO workspace on the Mac.

[env:seeed_xiao_esp32s3]
platform  = espressif32
board     = seeed_xiao_esp32s3
framework = arduino

monitor_speed = 115200
; upload/monitor use the native USB-C port
upload_protocol = esptool

build_flags =
    ; Route Serial to the native USB CDC (TinyUSB) — this is the provisioning
    ; channel the Pi talks to, and the VID that kilodash detects (0x303A).
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=2

lib_deps =
    ; MCP2515 driver with explicit clock select (needed for the 16 MHz xtal)
    coryjfowler/mcp_can @ ^1.5.1

; WiFi, WiFiUdp, ESPmDNS, Preferences (NVS) all ship with the ESP32 Arduino core.
